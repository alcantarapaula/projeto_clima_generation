<!DOCTYPE html>
<html lang="pt-BR" data-mode="day">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clima360</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Weather Icons (font icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <div class="app">

    <!-- Atmospheric orbs (background decoration) -->
    <div class="bg-canvas" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
    </div>

    <!-- ══════════════════════════════
         SEARCH SCREEN
    ══════════════════════════════ -->
    <section class="screen" id="searchScreen">
      <div class="search-wrap">

        <div class="brand">
          <i class="wi brand-icon" id="brandIcon"></i>
          <h1 class="brand-title">Clima360</h1>
          <p class="brand-sub">Previsão do tempo para qualquer cidade do mundo</p>
        </div>

        <div class="search-field">
          <div class="input-box">
            <!-- Search icon -->
            <svg class="ico-search" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>

            <input
              type="text"
              id="cityInput"
              class="city-input"
              placeholder="Buscar cidade..."
              autocomplete="off"
              spellcheck="false"
              aria-label="Buscar cidade"
              aria-autocomplete="list"
              aria-controls="suggestionsList"
            />

            <!-- Loading spinner -->
            <span class="loader-ring" id="loaderRing" aria-hidden="true"></span>
          </div>

          <!-- Suggestions dropdown -->
          <ul class="suggestions" id="suggestionsList"
              role="listbox" aria-label="Sugestões de cidades"></ul>
        </div>

      </div>
    </section>

    <!-- ══════════════════════════════
         WEATHER SCREEN
    ══════════════════════════════ -->
    <section class="screen hidden" id="weatherScreen">
      <div class="weather-wrap">

        <!-- Back button -->
        <button class="back-btn" id="backBtn" aria-label="Voltar à busca">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span>Voltar</span>
        </button>

        <!-- Weather Card -->
        <div class="weather-card" id="weatherCard">

          <!-- City & Time -->
          <header class="wc-header">
            <div class="wc-location">
              <h2 class="wc-city" id="cityName">—</h2>
              <p class="wc-region" id="cityRegion">—</p>
            </div>
            <time class="wc-time" id="localTime">—</time>
          </header>

          <!-- Main weather info -->
          <div class="wc-main">
            <i class="wi wc-weather-icon" id="weatherIcon" aria-hidden="true"></i>
            <div class="wc-temp-block">
              <div class="wc-temp">
                <span class="temp-val" id="tempValue">—</span>
                <sup class="temp-deg">°C</sup>
              </div>
              <p class="wc-condition" id="weatherCondition">—</p>
              <p class="wc-feels" id="feelsLike"></p>
            </div>
          </div>

          <hr class="wc-divider" />

          <!-- Extra details -->
          <footer class="wc-details">
            <div class="wc-detail-item">
              <i class="wi wi-humidity wc-detail-icon" aria-hidden="true"></i>
              <div class="wc-detail-text">
                <span class="wc-detail-label">Humidade</span>
                <span class="wc-detail-value" id="humidity">—</span>
              </div>
            </div>
            <div class="wc-detail-item">
              <i class="wi wi-strong-wind wc-detail-icon" aria-hidden="true"></i>
              <div class="wc-detail-text">
                <span class="wc-detail-label">Vento</span>
                <span class="wc-detail-value" id="windSpeed">—</span>
              </div>
            </div>
          </footer>

        </div><!-- /.weather-card -->

      </div>
    </section>

  </div><!-- /.app -->

  <script src="assets/js/api.js" type="module"></script>
</body>
</html>
